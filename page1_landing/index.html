<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/global.css">
    <style>
        body {
            width: 100vw; height: 100vh;
            background:
                linear-gradient(rgba(7,9,15,0.45), rgba(7,9,15,0.45)),
                url('../images/landing.webp') center/cover no-repeat;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: clamp(1.9rem, 3.8vw, 4.2rem);
            font-weight: 700;
            line-height: 1.08;
            letter-spacing: -0.025em;
            max-width: 960px;
            color: #ffffff;
        }

        .scroll-cue {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            color: #ffffff;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: float 2.4s ease-in-out infinite;
        }

        .scroll-cue svg {
            width: 20px; height: 20px;
            stroke: var(--accent); fill: none; stroke-width: 1.5;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
            50%       { transform: translateX(-50%) translateY(7px); opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>Investigating Global Disparities in Air Quality Sensors</h1>
    <div class="scroll-cue">
        <span>Scroll to explore</span>
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <script>
        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            window.parent.postMessage({ fpScroll: e.deltaY > 0 ? 'down' : 'up' }, '*');
        }, { passive: false });
    </script>
</body>
</html>
