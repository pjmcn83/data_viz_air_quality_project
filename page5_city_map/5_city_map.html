<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>City Vulnerability Map</title>

    <link rel="stylesheet" href="../styles/global.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Manrope', sans-serif;
        }

        #map-container {
            width: calc(100vw - 6vw);
            height: calc(100vh - 12vh);
            margin-top: 4vh;
            border: 4px solid #000000;
            position: relative;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .mapboxgl-ctrl-logo,
        .mapboxgl-ctrl-attrib {
            display: none !important;
        }

        /* ── Legend ──────────────────────────────────────────────────────── */
        .legend {
            position: absolute;
            bottom: 1.8rem;
            left: 1.4rem;
            z-index: 10;
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.09);
            padding: 10px 16px;
            border-radius: 0;
            font-family: 'Manrope', sans-serif;
            color: #e2e8f0;
            font-size: 12px;
            max-width: calc(100% - 40px);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .legend h4 {
            margin: 0;
            font-family: 'Manrope', sans-serif;
            color: #e2e8f0;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            gap: 8px;
            white-space: nowrap;
        }

        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-item span {
            font-size: 11px;
            line-height: 1.3;
        }

        /* ── Legend (Radius) ────────────────────────────────────────────── */
        .legend-radius {
            position: absolute;
            top: 50%;
            right: 1.4rem;
            z-index: 10;
            transform: translateY(-50%);
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.09);
            padding: 10px 16px;
            border-radius: 0;
            font-family: 'Manrope', sans-serif;
            font-size: 12px;
            color: #e2e8f0;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .legend-radius h4 {
            margin: 0;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            font-family: 'Manrope', sans-serif;
            color: #e2e8f0;
            text-align: center;
        }

        .legend-radius-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
        }

        .legend-radius-circle-container {
            width: 50px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .legend-radius-circle {
            border: 1px solid var(--accent);
            border-radius: 50%;
            background: rgba(56, 189, 248, 0.1);
            flex-shrink: 0;
        }

        .legend-radius-item span {
            font-size: 11px;
            line-height: 1.3;
        }

        /* ── Compare overlay ─────────────────────────────────────────────── */
        #compare-overlay {
            position: absolute;
            top: 46px;
            left: 12px;
            z-index: 19;
            display: flex;
            flex-direction: row;
            width: auto;
            max-width: calc(100% - 24px);
            max-height: calc(100% - 24px);
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            backdrop-filter: blur(16px);
            overflow: auto;
        }

        /* ── Instruction ─────────────────────────────────────────────────── */
        #cc-instruction {
            padding-bottom: 0.6rem;
            font-family: 'Manrope', sans-serif;
            font-size: 0.62rem;
            letter-spacing: 0.04em;
            line-height: 1.6;
            color: var(--text-muted);
        }

        /* ── Slots ───────────────────────────────────────────────────────── */
        .cc-slot {
            width: 280px;
            flex-shrink: 0;
            padding: 0.75rem 1rem;
        }

        .cc-slot+.cc-slot {
            border-left: 1px solid var(--border);
        }

        /* ── Selectors ───────────────────────────────────────────────────── */
        .cc-selectors {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.35rem;
        }

        .cc-select-group {
            display: flex;
            flex-direction: column;
            gap: 0.18rem;
        }

        .cc-select-group label {
            font-family: 'Manrope', sans-serif;
            font-size: 0.52rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
        }

        .cc-select-group select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.28rem 0.45rem;
            font-family: 'Manrope', sans-serif;
            font-size: 0.68rem;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            appearance: none;
        }

        .cc-select-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        #slot-2 .cc-select-group select:focus {
            border-color: var(--accent);
        }

        /* ── Slot body (badge + chart — hidden until city selected) ──────── */
        .cc-slot-body {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }

        .cc-slot-body.visible {
            display: flex;
        }

        /* ── Badge ───────────────────────────────────────────────────────── */
        .cc-badge {
            display: flex;
            align-items: stretch;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            flex-shrink: 0;
            overflow: hidden;
            min-height: 50px;
        }

        #badge-1 {
            border-left: 3px solid #38bdf8;
        }

        #badge-2 {
            border-left: 3px solid #f472b6;
        }

        .cc-badge-left {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.45rem 0.7rem;
            flex: 1;
            min-width: 0;
        }

        .cc-badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .cc-dot-1 {
            background: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
        }

        .cc-dot-2 {
            background: #f472b6;
            box-shadow: 0 0 8px rgba(244, 114, 182, 0.5);
        }

        .cc-badge-info {
            flex: 1;
            min-width: 0;
        }

        .cc-badge-city {
            font-family: 'Manrope', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cc-badge-meta {
            font-family: 'Manrope', sans-serif;
            font-size: 0.56rem;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cc-badge-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.45rem 0.75rem;
            border-left: 1px solid var(--border);
            min-width: 64px;
            flex-shrink: 0;
            gap: 2px;
        }

        .cc-badge-score {
            font-family: 'Manrope', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1;
        }

        #badge-score-1 {
            color: var(--accent);
        }

        #badge-score-2 {
            color: var(--accent);
        }

        .cc-badge-label {
            font-family: 'Manrope', sans-serif;
            font-size: 0.48rem;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .cc-badge-bar {
            width: 100%;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 3px;
            overflow: hidden;
        }

        .cc-badge-bar-fill {
            height: 100%;
            border-radius: 2px;
            width: 0%;
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #badge-1 .cc-badge-bar-fill {
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.5), #38bdf8);
        }

        #badge-2 .cc-badge-bar-fill {
            background: linear-gradient(90deg, rgba(244, 114, 182, 0.5), #f472b6);
        }

        /* ── Chart row (chart + expand button) ───────────────────────────── */
        .cc-chart-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cc-chart-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 260px;
        }

        .cc-chart-area svg {
            max-width: 100%;
            max-height: 100%;
            overflow: visible;
        }

        .cc-expand-btn {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            font-size: 18px;
            font-weight: 300;
            line-height: 1;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s;
        }

        .cc-expand-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .cc-expand-btn.visible {
            display: flex;
        }

        /* ── Empty chart state ───────────────────────────────────────────── */
        .cc-chart-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }

        .cc-chart-empty-text {
            font-family: 'Manrope', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
        }

        /* ── Close button ───────────────────────────────────────────── */
        .cc-close-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cc-close-btn:hover {
            color: #f87171;
            border-color: #f87171;
        }
    </style>
</head>

<body>
    <div id="map-container">
        <div id="map"></div>
        <div id="legend" class="legend"></div>
        <div id="legend-radius" class="legend-radius"></div>

        <div id="compare-overlay">
            <!-- Slot 1 -->
            <div class="cc-slot" id="slot-1">
                <button class="cc-close-btn" data-slot="1">×</button>
                <div id="cc-instruction">
                    Click cities on the map or select one<br>by region and country.
                </div>
                <div class="cc-selectors">
                    <div class="cc-select-group"><label for="region-1">Region</label><select id="region-1"></select>
                    </div>
                    <div class="cc-select-group"><label for="country-1">Country</label><select id="country-1"></select>
                    </div>
                    <div class="cc-select-group"><label for="city-1">City</label><select id="city-1"></select></div>
                </div>
                <div class="cc-slot-body" id="body-1">
                    <div class="cc-badge" id="badge-1">
                        <div class="cc-badge-left">
                            <span class="cc-badge-dot cc-dot-1"></span>
                            <div class="cc-badge-info">
                                <div class="cc-badge-city" id="badge-city-1">—</div>
                                <div class="cc-badge-meta" id="badge-meta-1">—</div>
                            </div>
                        </div>
                        <div class="cc-badge-right">
                            <div class="cc-badge-score" id="badge-score-1">—</div>
                            <div class="cc-badge-label">INDEX</div>
                            <div class="cc-badge-bar">
                                <div class="cc-badge-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="cc-chart-row">
                        <div class="cc-chart-area" id="chart-1"></div>
                        <button class="cc-expand-btn" id="expand-btn-2">+</button>
                    </div>
                </div>
            </div>

            <!-- Slot 2 (hidden until expanded) -->
            <div class="cc-slot" id="slot-2" style="display:none">
                <button class="cc-close-btn" data-slot="2">×</button>
                <div class="cc-selectors">
                    <div class="cc-select-group"><label for="region-2">Region</label><select id="region-2"></select>
                    </div>
                    <div class="cc-select-group"><label for="country-2">Country</label><select id="country-2"></select>
                    </div>
                    <div class="cc-select-group"><label for="city-2">City</label><select id="city-2"></select></div>
                </div>
                <div class="cc-slot-body" id="body-2">
                    <div class="cc-badge" id="badge-2">
                        <div class="cc-badge-left">
                            <span class="cc-badge-dot cc-dot-2"></span>
                            <div class="cc-badge-info">
                                <div class="cc-badge-city" id="badge-city-2">—</div>
                                <div class="cc-badge-meta" id="badge-meta-2">—</div>
                            </div>
                        </div>
                        <div class="cc-badge-right">
                            <div class="cc-badge-score" id="badge-score-2">—</div>
                            <div class="cc-badge-label">INDEX</div>
                            <div class="cc-badge-bar">
                                <div class="cc-badge-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="cc-chart-row">
                        <div class="cc-chart-area" id="chart-2"></div>
                        <button class="cc-expand-btn" id="expand-btn-2">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Map setup ─────────────────────────────────────────────────────
        mapboxgl.accessToken = 'pk.eyJ1Ijoic3NvdWJpZWUiLCJhIjoiY21rbnZpc2dvMG91eTNncjF0OWdndjg2YyJ9.6M6WA4fda7c8ZIXl4YZJdg';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/emilydugmore/cmneoxtrw003a01r11o2c6f7f',
            center: [10, 20],
            zoom: 1.0,
            projection: 'mercator'
        });

        const breaks = [0.1981127, 0.337149, 0.4216144, 0.4852908, 0.5424533, 0.598436, 0.7022134];
        const colors = ['#FCCC64', '#D4A43C', '#EF6F43', '#C7471B', '#BC3112', '#930816', '#7E0C01'];

        function createLegend() {
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            const title = document.createElement('h4');
            title.textContent = 'Air Quality Index';
            legend.appendChild(title);
            for (let i = 0; i < colors.length; i++) {
                const item = document.createElement('div'); item.className = 'legend-item';
                const colorBox = document.createElement('div'); colorBox.className = 'legend-color'; colorBox.style.backgroundColor = colors[i];
                const label = document.createElement('span');
                if (i === 0) label.textContent = `< ${breaks[1].toFixed(2)}`;
                else if (i === colors.length - 1) label.textContent = `> ${breaks[breaks.length - 1].toFixed(2)}`;
                else label.textContent = `${breaks[i].toFixed(2)} – ${breaks[i + 1].toFixed(2)}`;
                item.appendChild(colorBox); item.appendChild(label); legend.appendChild(item);
            }
        }

        function createRadiusLegend() {
            const legendRadius = document.getElementById('legend-radius');
            legendRadius.innerHTML = '';
            const title = document.createElement('h4');
            title.textContent = 'City Population';
            legendRadius.appendChild(title);

            // Define 4 representative population values
            const radiusData = [
                { population: 1000000, label: '1M' },
                { population: 5000000, label: '5M' },
                { population: 25000000, label: '25M' },
                { population: 50000000, label: '50M' }
            ];

            radiusData.forEach(data => {
                const item = document.createElement('div');
                item.className = 'legend-radius-item';

                // Calculate radius based on the interpolation formula from the map
                const lnPop = Math.log(data.population);
                const radius = 6 + (lnPop - 13.81663) * (22 - 6) / (17.57642 - 13.81663);

                // Create container for circle (fixed width to align circles on same axis)
                const circleContainer = document.createElement('div');
                circleContainer.className = 'legend-radius-circle-container';

                const circle = document.createElement('div');
                circle.className = 'legend-radius-circle';
                circle.style.width = (radius * 2) + 'px';
                circle.style.height = (radius * 2) + 'px';

                circleContainer.appendChild(circle);

                const label = document.createElement('span');
                label.textContent = data.label;

                item.appendChild(circleContainer);
                item.appendChild(label);
                legendRadius.appendChild(item);
            });
        }

        map.addControl(new mapboxgl.NavigationControl());
        map.addControl(new mapboxgl.ScaleControl(), 'bottom-right');

        map.on('load', () => {
            map.addLayer({
                id: 'cities-fill', type: 'fill',
                source: { type: 'vector', url: 'mapbox://ssoubiee.cbbz95f7' },
                'source-layer': 'cities_shape-99zbxb',
                paint: {
                    'fill-color': ['interpolate', ['linear'], ['to-number', ['coalesce', ['get', 'index'], 0]],
                        0.1981127, '#FAF7D2', 0.337149, '#E1CA89', 0.4216144, '#BE852C',
                        0.4852908, '#99300C', 0.5424533, '#80100C', 0.598436, '#660607', 0.7022134, '#470607'],
                    'fill-opacity': ['interpolate', ['linear'], ['zoom'], 5, 0, 6, 0.5, 7, 0.8],
                    'fill-emissive-strength': 1
                }
            });

            map.addLayer({
                id: 'cities-circles', type: 'circle',
                source: { type: 'vector', url: 'mapbox://ssoubiee.7z2u6nko' },
                'source-layer': 'cities_points-d6u7bw',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['ln', ['get', 'population']], 13.81663, 6, 17.57642, 22],
                    'circle-color': ['interpolate', ['linear'], ['to-number', ['coalesce', ['get', 'index'], 0]],
                        0.1981127, '#FAF7D2', 0.337149, '#E1CA89', 0.4216144, '#BE852C',
                        0.4852908, '#99300C', 0.5424533, '#80100C', 0.598436, '#660607', 0.7022134, '#470607'],
                    'circle-emissive-strength': 0.8,
                    'circle-blur': 0.3,
                    'circle-opacity': ['interpolate', ['linear'], ['zoom'], 3, 1.0, 5, 0.9, 6, 0.4, 7, 0]
                }
            });

            map.on('click', 'cities-circles', (e) => {
                addCityFromMap(e.features[0].properties.city);
            });
            map.on('mouseenter', 'cities-circles', () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', 'cities-circles', () => { map.getCanvas().style.cursor = ''; });

            createLegend();
            createRadiusLegend();
        });


        // ── Compare panel ─────────────────────────────────────────────────
        let DATA = [];
        const selectedCities = { 1: null, 2: null };
        const slotExpanded = { 1: true, 2: false };

        document.getElementById('expand-btn-2').addEventListener('click', () => expandSlot(2));

        document.querySelectorAll('.cc-close-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const slot = parseInt(e.target.dataset.slot);
                closeSlot(slot);
            });
        });

        function expandSlot(p) {
            slotExpanded[p] = true;
            document.getElementById(`slot-${p}`).style.display = 'block';
            document.getElementById(`expand-btn-${p}`).classList.remove('visible');
        }

        // ── Load data ─────────────────────────────────────────────────────
        fetch('../data/cities.json')
            .then(r => r.json())
            .then(data => {
                DATA = data.map(stripBOM);
                initSelectors(1); initSelectors(2);
            })
            .catch(err => console.error('Error loading cities.json:', err));

        function stripBOM(obj) {
            const out = {};
            for (const key in obj) {
                const k = key.replace(/^﻿/, '').trim();
                const v = obj[key];
                out[k] = typeof v === 'string' ? v.replace(/^﻿/, '').trim() : v;
            }
            return out;
        }

        // ── Selectors ─────────────────────────────────────────────────────
        function initSelectors(p) {
            populateSelect(`region-${p}`, [...new Set(DATA.map(d => d.region))].sort(), 'All regions');
            populateSelect(`country-${p}`, [...new Set(DATA.map(d => d.country))].sort(), 'All countries');
            populateSelect(`city-${p}`, [], 'Select a city...');
            document.getElementById(`region-${p}`).addEventListener('change', () => onRegionChange(p));
            document.getElementById(`country-${p}`).addEventListener('change', () => onCountryChange(p));
            document.getElementById(`city-${p}`).addEventListener('change', () => onCityChange(p));
        }

        function populateSelect(id, options, placeholder) {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">${placeholder}</option>` +
                options.map(o => `<option value="${o}">${o}</option>`).join('');
        }

        function onRegionChange(p) {
            const region = document.getElementById(`region-${p}`).value;
            const filtered = region ? DATA.filter(d => d.region === region) : DATA;
            populateSelect(`country-${p}`, [...new Set(filtered.map(d => d.country))].sort(), 'All countries');
            populateSelect(`city-${p}`, [], 'Select a city...');
        }

        function onCountryChange(p) {
            const region = document.getElementById(`region-${p}`).value;
            const country = document.getElementById(`country-${p}`).value;
            let filtered = DATA;
            if (region) filtered = filtered.filter(d => d.region === region);
            if (country) filtered = filtered.filter(d => d.country === country);
            populateSelect(`city-${p}`, [...new Set(filtered.map(d => d.city))].sort(), 'Select a city...');
        }

        function onCityChange(p) {
            const city = DATA.find(d => d.city === document.getElementById(`city-${p}`).value) || null;
            if (city) setCity(p, city);
        }

        // ── City selection ────────────────────────────────────────────────
        function addCityFromMap(cityName) {
            const city = DATA.find(d => d.city === cityName);
            if (!city) return;
            for (let p = 1; p <= 2; p++) {
                if (!selectedCities[p]) {
                    if (!slotExpanded[p]) expandSlot(p);
                    setCity(p, city);
                    return;
                }
            }
            // All 2 full: replace slot 1 only
            setCity(1, city);
        }

        function setCity(p, city) {
            selectedCities[p] = city;
            // Hide instruction once first city selected
            if (p === 1) document.getElementById('cc-instruction').style.display = 'none';
            updateBadge(p, city);
            drawRadar(p, city);
            document.getElementById(`body-${p}`).classList.add('visible');
            // Show "+" for next slot if not yet expanded and p < 2
            if (p < 2 && !slotExpanded[p + 1]) {
                document.getElementById(`expand-btn-${p + 1}`).classList.add('visible');
            }
        }

        // ── Badge ──────────────────────────────────────────────────────────
        function updateBadge(p, city) {
            document.getElementById(`badge-city-${p}`).textContent = city ? city.city : '—';
            document.getElementById(`badge-meta-${p}`).textContent = city
                ? `${city.country} · ${city.region}` : '—';
            const scoreEl = document.getElementById(`badge-score-${p}`);
            const fill = document.querySelector(`#badge-${p} .cc-badge-bar-fill`);
            if (city && typeof city.index === 'number') {
                scoreEl.textContent = city.index.toFixed(3);
                if (fill) {
                    fill.style.width = '0%';
                    requestAnimationFrame(() => requestAnimationFrame(() => {
                        fill.style.width = `${(city.index * 100).toFixed(1)}%`;
                    }));
                }
            } else {
                scoreEl.textContent = '—';
                if (fill) fill.style.width = '0%';
            }
        }

        function closeSlot(p) {
            selectedCities[p] = null;

            // Ocultar contenido
            document.getElementById(`body-${p}`).classList.remove('visible');

            // Reset selects
            document.getElementById(`city-${p}`).value = '';

            // Reset badge
            updateBadge(p, null);

            // Clear chart
            document.getElementById(`chart-${p}`).innerHTML = '';

            // If slot 2 → hide it completely
            if (p === 2) {
                document.getElementById('slot-2').style.display = 'none';
                slotExpanded[2] = false;

                // Show expand button again
                document.getElementById('expand-btn-2').classList.remove('visible');
            }

            // If slot 1 → show instruction again
            if (p === 1 && !selectedCities[2]) {
                document.getElementById('cc-instruction').style.display = 'block';
            }
        }

        // ── Radar chart ────────────────────────────────────────────────────
        const AXES = [
            { key: 'sensors_norm', label: ['Sensor', 'Deficit'], invert: false },
            { key: 'greenness_norm', label: ['Greenness', "Deficit"], invert: false },
            { key: 'death_pm2_norm', label: ['PM2.5', 'Mortality'], invert: false },
            { key: 'density_norm', label: ['Pop.', 'Density'], invert: false },
            { key: 'land_consumption_norm', label: ['Land', 'Consumption'], invert: false },
            { key: 'hdi_norm', label: ['HDI', "Deficit"], invert: false },
        ];

        const COLOR = {
            1: { stroke: '#38bdf8', fill: 'rgba(56,189,248,0.22)' },
            2: { stroke: '#f472b6', fill: 'rgba(244,114,182,0.22)' },
            3: { stroke: '#a78bfa', fill: 'rgba(167,139,250,0.22)' },
        };

        function drawRadar(p, city) {
            const container = document.getElementById(`chart-${p}`);
            container.innerHTML = '';
            const W = container.clientWidth || 280;
            const H = container.clientHeight || 260;
            const size = Math.min(W, H, 440);
            const margin = size > 320 ? 88 : Math.round(size * 0.3);
            const R = (size / 2) - margin;
            const cx = size / 2, cy = size / 2;
            const angle = (2 * Math.PI) / AXES.length;
            const c = COLOR[p];

            const svg = d3.select(container).append('svg')
                .attr('width', size).attr('height', size)
                .attr('viewBox', `0 0 ${size} ${size}`)
                .style('overflow', 'visible');

            svg.append('text')
                .attr('x', cx).attr('y', 14)
                .attr('text-anchor', 'middle')
                .attr('fill', '#eb9429')
                .attr('font-size', '11px')
                .attr('font-weight', '600')
                .attr('font-family', "'Manrope', sans-serif")
                .attr('letter-spacing', '0.08em')
                .attr('opacity', 0.75)
                .text('VULNERABILITY PROFILE');

            const defs = svg.append('defs');
            const gradId = `radar-grad-${p}`;
            const grad = defs.append('radialGradient').attr('id', gradId)
                .attr('cx', '50%').attr('cy', '50%').attr('r', '50%');
            grad.append('stop').attr('offset', '0%').attr('stop-color', c.stroke).attr('stop-opacity', 0.06);
            grad.append('stop').attr('offset', '100%').attr('stop-color', c.stroke).attr('stop-opacity', 0);
            svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', R).attr('fill', `url(#${gradId})`);

            for (let lv = 1; lv <= 5; lv++) {
                const r = (R / 5) * lv;
                const pts = AXES.map((_, i) => {
                    const a = angle * i - Math.PI / 2;
                    return `${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`;
                }).join(' ');
                svg.append('polygon').attr('points', pts)
                    .attr('fill', lv % 2 === 0 ? 'rgba(56,189,248,0.03)' : 'none')
                    .attr('stroke', '#2a4060')
                    .attr('stroke-width', lv === 5 ? 1.4 : 0.8)
                    .attr('stroke-dasharray', lv === 5 ? 'none' : '2,3');
                svg.append('circle')
                    .attr('cx', cx).attr('cy', cy).attr('r', 2)
                    .attr('fill', '#2a4060')
                    .attr('stroke', '#3a5578').attr('stroke-width', 1);
                if (lv === 5 || lv === 3 || lv === 1) {
                    svg.append('text').attr('x', cx + 4).attr('y', cy - r + 3)
                        .attr('fill', '#5a7595').attr('font-size', '8px')
                        .attr('font-family', "'JetBrains Mono', monospace")
                        .attr('opacity', 0.5)
                        .text((lv / 5).toFixed(1));
                }
            }

            AXES.forEach((axis, i) => {
                const a = angle * i - Math.PI / 2;
                const x2 = cx + R * Math.cos(a), y2 = cy + R * Math.sin(a);
                svg.append('line').attr('x1', cx).attr('y1', cy).attr('x2', x2).attr('y2', y2)
                    .attr('stroke', '#2a4060').attr('stroke-width', 1)
                    .attr('stroke-dasharray', '2,3').attr('opacity', 0.6);
                const cosA = Math.cos(a);
                const lateralBoost = Math.abs(cosA) > 0.3 ? 26 : 0;
                const lr = R + 17 + lateralBoost;
                const lx = cx + lr * Math.cos(a), ly = cy + lr * Math.sin(a);

                // Label type (string vs array for multi-line)
                const lines = Array.isArray(axis.label) ? axis.label : [axis.label];
                const lineHeight = 13;
                // Vertical adjustment: if below, extra lines go below; if above, all lines move up together
                const isBottom = Math.sin(a) > 0.2;
                const yOffset = isBottom ? 3 : -5 - (lines.length - 1) * lineHeight;

                const textEl = svg.append('text')
                    .attr('x', lx).attr('y', ly + yOffset)
                    .attr('text-anchor', 'middle').attr('fill', '#cfdbe8')
                    .attr('font-size', '11.5px').attr('font-weight', '700')
                    .attr('font-family', "'Syne', sans-serif").attr('letter-spacing', '0.05em');

                lines.forEach((line, idx) => {
                    textEl.append('tspan')
                        .attr('x', lx).attr('dy', idx === 0 ? 0 : lineHeight)
                        .attr('text-anchor', 'middle')
                        .text(line.toUpperCase());
                });
            });
            const values = AXES.map(ax => {
                let v = city[ax.key];
                if (isNaN(v)) return 0;
                v = Math.max(0, Math.min(1, v));
                // Invert if the axis represents a "good" attribute to standardize direction
                return ax.invert ? 1 - v : v;
            }); const polyPts = values.map((v, i) => {
                const a = angle * i - Math.PI / 2;
                return `${cx + v * R * Math.cos(a)},${cy + v * R * Math.sin(a)}`;
            }).join(' ');
            svg.append('polygon').attr('points', polyPts)
                .attr('fill', c.fill).attr('stroke', c.stroke)
                .attr('stroke-width', 2.5).attr('stroke-linejoin', 'round')
                .attr('filter', `drop-shadow(0 0 6px ${c.stroke}55)`)
                .attr('opacity', 0).transition().duration(600).ease(d3.easeCubicOut).attr('opacity', 1);

            values.forEach((v, i) => {
                const a = angle * i - Math.PI / 2;
                const vx = cx + v * R * Math.cos(a), vy = cy + v * R * Math.sin(a);
                const dot = svg.append('circle')
                    .attr('cx', vx).attr('cy', vy).attr('r', 5)
                    .attr('fill', c.stroke).attr('stroke', '#060a12').attr('stroke-width', 2)
                    .attr('opacity', 0).style('cursor', 'pointer');
                dot.transition().delay(500).duration(200).attr('opacity', 1);
                const tipW = 92, tipH = 34;
                const tipX = vx + (Math.cos(a) >= 0 ? 10 : -tipW - 10);
                const tipY = vy - tipH / 2;
                const tip = svg.append('g').attr('opacity', 0).attr('pointer-events', 'none');
                tip.append('rect').attr('x', tipX).attr('y', tipY).attr('width', tipW).attr('height', tipH).attr('rx', 5)
                    .attr('fill', '#0d1420').attr('stroke', c.stroke).attr('stroke-width', 1);
                tip.append('text').attr('x', tipX + tipW / 2).attr('y', tipY + 12)
                    .attr('text-anchor', 'middle').attr('fill', '#6b84a0').attr('font-size', '8px')
                    .attr('font-family', "'JetBrains Mono', monospace").text(AXES[i].label);
                tip.append('text').attr('x', tipX + tipW / 2).attr('y', tipY + 26)
                    .attr('text-anchor', 'middle').attr('fill', c.stroke)
                    .attr('font-size', '11px').attr('font-weight', '700')
                    .attr('font-family', "'JetBrains Mono', monospace").text(v.toFixed(3));
                dot.on('mouseover', () => { dot.attr('r', 7); tip.transition().duration(120).attr('opacity', 1); })
                    .on('mouseout', () => { dot.attr('r', 5); tip.transition().duration(120).attr('opacity', 0); });

            });

            // Axis direction legend
            const legendY = size - 10;
            const legendG = svg.append('g').attr('opacity', 0.7);

            legendG.append('text')
                .attr('x', cx).attr('y', legendY + 3)
                .attr('text-anchor', 'middle')
                .attr('fill', '#eb9429')
                .attr('font-size', '10px')
                .attr('font-style', 'italic')
                .attr('font-family', "'Manrope', sans-serif")
                .attr('opacity', 0.8)
                .text('The larger the area, the more vulnerable the city');


        }
    </script>
</body>
