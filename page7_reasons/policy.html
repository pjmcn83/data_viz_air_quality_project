<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #07090f; }
        #map { width: 100%; height: 100vh; }
        .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZW1pbHlkdWdtb3JlIiwiYSI6ImNta285NjZiZzAzMzQza3M5ZmRodHp6ZDcifQ.geVyLy4fYjBWRAGJSbwN-g';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/emilydugmore/cmneoxtrw003a01r11o2c6f7f',
        bounds: [[-87.9599, 41.6443], [-87.5237, 42.0252]],
        fitBoundsOptions: { padding: 5 },
        projection: 'mercator'
    });

    const sensorsReady = new Promise(resolve => {
        fetch('./data/chicago.geojson')
            .then(r => r.json())
            .then(data => resolve(data.features[0].geometry));
    });

    map.on('load', () => {
        map.setFog(null);

        map.addSource('chicago-pm25', {
            type: 'vector',
            url: 'mapbox://emilydugmore.1vpkw6qq'
        });

        map.addLayer({
            id: 'chicago-choropleth',
            type: 'fill',
            slot: 'middle',
            source: 'chicago-pm25',
            'source-layer': 'chicago_PM25-4u8b7q',
            paint: {
                'fill-color': [
                    'interpolate', ['linear'], ['get', 'pm_25'],
                    8.6,  '#fef9c3',
                    9.0,  '#fbbf24',
                    9.4,  '#f97316',
                    9.756,'#dc2626'
                ],
                'fill-opacity': 0.8,
                'fill-emissive-strength': 0.8
            }
        });

        map.addLayer({
            id: 'chicago-choropleth-outline',
            type: 'line',
            slot: 'middle',
            source: 'chicago-pm25',
            'source-layer': 'chicago_PM25-4u8b7q',
            paint: {
                'line-color': '#000000',
                'line-width': 0.7,
                'line-emissive-strength': 1
            }
        });

        map.addSource('sensors', {
            type: 'vector',
            url: 'mapbox://emilydugmore.96ka7gjb'
        });

        sensorsReady.then(geometry => {
            map.addLayer({
                id: 'chicago-sensor-dots',
                type: 'circle',
                slot: 'middle',
                source: 'sensors',
                'source-layer': 'AQICN_sensors-5r58jr',
                filter: ['within', geometry],
                paint: {
                    'circle-emissive-strength': 1,
                    'circle-radius': 3,
                    'circle-color': '#eb9429',
                    'circle-stroke-width': 1.5,
                    'circle-stroke-color': '#000000'
                }
            });
        });
    });
</script>
</body>
</html>
