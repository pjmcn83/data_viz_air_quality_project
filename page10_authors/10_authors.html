<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authors</title>
  <link rel="stylesheet" href="../styles/global.css">
  <style>
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #fp-nav ul li a span { background: var(--accent) !important; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Manrope', sans-serif;
    }

    .team-section {
      text-align: center;
      padding: 4rem 3rem 3.5rem;
    }

    .team-title {
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      font-size: clamp(2.2rem, 3.8vw, 3.5rem);
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .title-divider {
      width: 80px;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 auto 3.5rem;
    }

    .team-grid {
      display: flex;
      justify-content: center;
      gap: 6.5rem;
      flex-wrap: wrap;
    }

    .member-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      width: 190px;
      animation: fadeUp 0.6s ease both;
    }

    .member-card:nth-child(1) { animation-delay: 0.1s; }
    .member-card:nth-child(2) { animation-delay: 0.25s; }
    .member-card:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar-ring {
      width: 175px;
      height: 175px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(from 180deg, var(--accent), rgba(235, 148, 41, 0.6), var(--accent));
      box-shadow: 0 0 28px rgba(235, 148, 41, 0.25);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .avatar-ring:hover {
      box-shadow: 0 0 36px rgba(235, 148, 41, 0.4);
      transform: scale(1.04);
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(7, 9, 15, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Manrope', sans-serif;
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--accent);
    }

    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .member-name {
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--text);
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      transition: color 0.2s, opacity 0.2s;
      background: none;
      border: none;
      font-family: 'Manrope', sans-serif;
    }

    .github-link:hover { color: rgba(235, 148, 41, 0.8); }

    .footer {
      margin-top: 3.8rem;
      display: flex;
      justify-content: center;
    }

    .github-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0.7rem 1.7rem;
      border-radius: 999px;
      border: 1px solid rgba(235, 148, 41, 0.3);
      background: transparent;
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.25s, color 0.25s, background 0.25s;
    }

    .github-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(235, 148, 41, 0.08);
    }

    .github-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <section class="team-section">
    <h2 class="team-title">Our Team</h2>
    <div class="title-divider"></div>

   <div class="team-grid">

      <div class="member-card">
        <div class="avatar-ring">
          <img src="../images/emily.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
        </div>
        <p class="member-name">Emily Dugmore</p>
        <a class="github-link" href="https://github.com" target="_blank" rel="noopener">Github page</a>
      </div>

      <div class="member-card">
        <div class="avatar-ring">
          <div class="avatar-inner">TC</div>
        </div>
        <p class="member-name">Paul McNicholas</p>
        <a class="github-link" href="https://github.com" target="_blank" rel="noopener">Github page</a>
      </div>

      <div class="member-card">
        <div class="avatar-ring">
          <img src="../images/santiago.JPG" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
        </div>
        <p class="member-name">Santiago Soubie</p>
        <a class="github-link" href="https://github.com/SSoubie" target="_blank" rel="noopener">@SSoubie</a>
      </div>
    </div>

    <div class="footer">
      <a class="github-btn" href="https://github.com/SSoubie/data_viz_air_quality_project" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.48 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Repository
      </a>
    </div>
  </section>
</body>
</html>
